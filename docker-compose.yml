services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:./prisma/marketplace.db
      - NEXT_PUBLIC_SITE_URL=https://cortexprism.io
      - SITE_URL=https://cortexprism.io
      - NEXT_PUBLIC_GITHUB_REPO=CortexPrism/cortex
    volumes:
      - ./prisma:/app/prisma
    restart: unless-stopped
